spring:
  application:
    name: ORDER-SERVICE

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0   # trace all requests (use lower in prod)

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans